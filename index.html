<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Advanced Attendance Scanner</title>

  <style>
      body {
        background: #0f172a;
        color: #e2e8f0;
        font-family: sans-serif;
        text-align: center;
        padding: 10px;
      }
      #videoBox {
        width: 100%;
        max-width: 420px;
        margin: auto;
        position: relative;
      }
      video {
        width: 100%;
        border-radius: 12px;
      }
      #output {
        width: 100%;
        max-width: 420px;
        margin-top: 12px;
        border: 2px solid #475569;
        border-radius: 12px;
      }
      button {
        padding: 12px 20px;
        border-radius: 10px;
        border: none;
        font-size: 16px;
        margin: 10px;
        cursor: pointer;
      }
      #captureBtn {
        background: #22c55e;
        color: black;
      }
      #downloadBtn {
        background: #38bdf8;
        color: black;
      }
  </style>

  <!-- Load OpenCV.js -->
  <script async src="https://docs.opencv.org/master/opencv.js"></script>

</head>
<body>

<h2>📄 Advanced Attendance Scanner</h2>
<p>Sheet ne camera ni samne straight rakho → Capture dabāvo → Auto fix thai jase.</p>

<div id="videoBox">
  <video id="video" autoplay playsinline></video>
</div>

<button id="captureBtn">📸 Capture</button>

<br>
<canvas id="output"></canvas>
<br>
<button id="downloadBtn" style="display:none;">⬇ Download Scanned Image</button>

<script>

// start camera
navigator.mediaDevices.getUserMedia({
    video: { facingMode: "environment" }
}).then(stream => {
    video.srcObject = stream;
});

// Capture + Auto Process
document.getElementById("captureBtn").onclick = function() {
    const video = document.getElementById("video");
    const canvas = document.getElementById("output");
    const ctx = canvas.getContext("2d");

    // Draw frame
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    ctx.drawImage(video, 0, 0);

    // Convert to OpenCV mat
    let src = cv.imread(canvas);

    // === 1. Convert to grayscale
    let gray = new cv.Mat();
    cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);

    // === 2. Auto brightness / contrast
    cv.equalizeHist(gray, gray);

    // === 3. Gaussian blur
    cv.GaussianBlur(gray, gray, new cv.Size(5,5), 0);

    // === 4. Edge detection
    let edges = new cv.Mat();
    cv.Canny(gray, edges, 50, 150);

    // === 5. Find contours
    let contours = new cv.MatVector();
    let hierarchy = new cv.Mat();
    cv.findContours(edges, contours, hierarchy, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);

    let biggest = null;
    let maxArea = 0;

    for (let i = 0; i < contours.size(); i++) {
        let cnt = contours.get(i);
        let area = cv.contourArea(cnt);

        if (area < 50000) continue; // skip noise

        let peri = cv.arcLength(cnt, true);
        let approx = new cv.Mat();
        cv.approxPolyDP(cnt, approx, 0.02 * peri, true);

        if (approx.rows === 4 && area > maxArea) {
            maxArea = area;
            biggest = approx;
        }
    }

    if (!biggest) {
        alert("Cannot detect sheet. Try holding straighter with better lighting.");
        return;
    }

    // === 6. Sort rectangle points
    let pts = [];
    for (let i = 0; i < 4; i++) {
        pts.push({
            x: biggest.intPtr(i,0)[0],
            y: biggest.intPtr(i,0)[1]
        });
    }

    pts.sort((a,b) => a.y - b.y);
    let top = pts.slice(0,2).sort((a,b) => a.x - b.x);
    let bottom = pts.slice(2,4).sort((a,b) => a.x - b.x);

    let srcTri = cv.matFromArray(4, 1, cv.CV_32FC2, [
      top[0].x, top[0].y,
      top[1].x, top[1].y,
      bottom[0].x, bottom[0].y,
      bottom[1].x, bottom[1].y
    ]);

    // === 7. Warp to A4-like fixed size
    let w = 900, h = 1300;
    let dstTri = cv.matFromArray(4, 1, cv.CV_32FC2, [
      0, 0,
      w, 0,
      0, h,
      w, h
    ]);

    let M = cv.getPerspectiveTransform(srcTri, dstTri);
    let output = new cv.Mat();
    cv.warpPerspective(src, output, M, new cv.Size(w, h));

    // === 8. Final brightness & sharpness
    cv.GaussianBlur(output, output, new cv.Size(3,3), 0);
    cv.cvtColor(output, output, cv.COLOR_RGBA2GRAY);
    cv.equalizeHist(output, output);

    // show output
    cv.imshow("output", output);

    document.getElementById("downloadBtn").style.display = "inline-block";

    // cleanup
    src.delete(); gray.delete(); edges.delete();
    contours.delete(); hierarchy.delete();

};

// download scanned
document.getElementById("downloadBtn").onclick = () => {
    const canvas = document.getElementById("output");
    let a = document.createElement("a");
    a.href = canvas.toDataURL("image/jpeg", 0.95);
    a.download = "attendance_scan.jpg";
    a.click();
};

</script>

</body>
</html>
